[platformio]
default_envs = genericSTM32F405RG

[env:genericSTM32F405RG]
platform = ststm32
board = genericSTM32F405RG
framework = stm32cube

upload_protocol = stlink
debug_tool = stlink
upload_flags =
    -c
    adapter speed 100
    -c
    reset_config none
build_type = release
build_unflags = -Os -O1 -O2 -O3
monitor_speed = 115200

build_flags =
    -O3
    -DSTM32F405xx
    -DUSE_HAL_DRIVER
    -DHARDWARE_BUILD
    -DST7789_ROTATION=3
    -DLCD_USE_18BIT_COLOR=0
    -DST7789_USE_DMA=1
    -DST7789_CS_ALWAYS_ACTIVE=1
    -DST7789_CS_ACTIVE_LOW=1
    -DST7789_COLOR_ORDER_BGR=0
    -DST7789_INVERT_DEFAULT=0
    ; Production-speed ST7789 path on PCB:
    ;   SPI_BAUDRATEPRESCALER_8 = 21.0 MHz
    ;   DMA enabled for larger display writes
    ; Backed off one step from /4 after visible zig-zag/tearing artifacts.
    -DST7789_SPI1_PRESCALER=SPI_BAUDRATEPRESCALER_8
    -DX_SHIFT=0
    -DY_SHIFT=0
    -I.
    -Iplatform/mcp23017
    -Iplatform/fram
    -Istm32
    -Istm32/hw

build_src_filter =
    -<*>
    +<../stm32/main_stm32.c>
    +<../stm32/stm32f4xx_hal_msp.c>
    +<../stm32/stm32f4xx_it.c>
    +<../stm32/hw/*.c>
    +<../platform/mcp23017/*.c>
    +<../platform/fram/*.c>