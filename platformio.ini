[env:genericSTM32F405RG]
platform = ststm32
board = genericSTM32F405RG
framework = stm32cube

upload_protocol = stlink
debug_tool = stlink
build_type = debug
build_unflags = -Os -O1 -O2 -O3
monitor_speed = 115200

build_flags =
     -O0
    -g3
    -DSTM32F405xx
    -DUSE_HAL_DRIVER
    -DHARDWARE_BUILD
    -I.
    -Icore
    -Idevices
    -Iplatform
    -Istm32
    -Istm32/hw
    -Iplatform/mcp23017
    -Iui

build_src_filter =
    -<*>
    +<../stm32/*.c>
    +<../stm32/hw/*.c>
    +<../platform/mcp23017/*.c>
    +<../platform/midi/*.cpp>
    +<../core/*.cpp>
    +<../devices/sequencer/*.cpp>
    +<../devices/sequencer/chords/*.cpp>
    +<../ui/*.c>